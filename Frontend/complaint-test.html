<!DOCTYPE html>
<html>
<head>
  <title>RoadWatch Complaint Test</title>
  <script type="module">
    // Import Firebase SDKs
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    // Firebase config
    const firebaseConfig = {
      apiKey: "AIzaSyBaONr2nmrn5xugANKCLNnH11gAGDeE3nk",
      authDomain: "roadwatch-803a4.firebaseapp.com",
      projectId: "roadwatch-803a4",
      storageBucket: "roadwatch-803a4.firebasestorage.app",
      messagingSenderId: "1004518321032",
      appId: "1:1004518321032:web:1d8ff3e6b6d6970f44a83d",
      measurementId: "G-GTBXRTTGR2"
    };

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    async function submitComplaint() {
      const location = document.getElementById("location").value;
      const issueType = document.getElementById("issueType").value;
      const description = document.getElementById("description").value;
      const severity = document.getElementById("severity").value;
      const userId = document.getElementById("userId").value || "anonymous";

      const complaint = {
        location: location,
        issueType: issueType,
        description: description,
        severity: severity,
        userId: userId,          // now userId is included
        status: "pending",
        createdAt: new Date()    // auto-set
      };

      try {
        await addDoc(collection(db, "complaints"), complaint);
        alert("Complaint submitted to Firebase!");
      } catch (e) {
        console.error("Error adding complaint: ", e);
        alert("Error submitting complaint. Check console.");
      }
    }

    window.submitComplaint = submitComplaint;
  </script>
</head>
<body>
  <h1>RoadWatch Complaint Test</h1>
  <input type="text" id="location" placeholder="Enter location (e.g. NH-48 km 12)" />
  <br><br>
  <input type="text" id="issueType" placeholder="Enter issue type (e.g. pothole)" />
  <br><br>
  <input type="text" id="description" placeholder="Enter complaint description..." />
  <br><br>
  <select id="severity">
    <option value="">Select severity</option>
    <option value="Low">Low</option>
    <option value="Medium">Medium</option>
    <option value="High">High</option>
  </select>
  <br><br>
  <input type="text" id="userId" placeholder="Enter user ID (optional)" />
  <br><br>
  <button onclick="submitComplaint()">Submit Complaint</button>
</body>
</html>
